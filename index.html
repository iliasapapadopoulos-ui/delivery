<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πλοήγηση με Διεύθυνση</title>
    <style>
        body { 
            background: #1a202c; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            gap: 15px; 
        }
        .search-box {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 2px solid #4a5568;
            background: #2d3748;
            color: white;
            outline: none;
            text-align: center;
        }
        .search-box:focus {
            border-color: #1a73e8;
        }
        .nav-btn { 
            background: #1a73e8;
            color: white; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav-btn:active {
            background: #155cb4;
        }
    </style>
</head>
<body>

    <!-- Πλαίσιο εισαγωγής διεύθυνσης -->
    <input type="text" id="addressInput" class="search-box" placeholder="Γράψε διεύθυνση ή πόλη..." autocomplete="off">

    <!-- Κουμπί για έναρξη πλοήγησης -->
    <button class="nav-btn" onclick="startNavigation()">🚀 Έναρξη Πλοήγησης</button>

    <script>
        function startNavigation() {
            // Παίρνουμε το κείμενο που έγραψε ο χρήστης
            const address = document.getElementById('addressInput').value.trim();
            
            // Αν το πλαίσιο είναι άδειο, σταματάμε και ενημερώνουμε τον χρήστη
            if (address === "") {
                alert("Παρακαλώ πληκτρολόγησε μια διεύθυνση πρώτα!");
                return;
            }
            
            // Μετατρέπουμε το κείμενο σε ασφαλή μορφή URL (π.χ. τα κενά γίνονται %20)
            const encodedAddress = encodeURIComponent(address);
            
            // Δημιουργούμε το Universal Link της Google για απευθείας πλοήγηση (Directions)
            const mapsUrl = `https://google.com{encodedAddress}`;
            
            // Ανοίγουμε τον σύνδεσμο σε νέα καρτέλα (ή στην εφαρμογή Maps του κινητού)
            window.open(mapsUrl, '_blank');
        }
    </script>

</body>
</html>
