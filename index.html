<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Φωνητική Πλοήγηση</title>
    <style>
        /* Ρυθμίσεις για οθόνη κινητού */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Αφαιρεί το μπλε φλας στο πάτημα */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Η πάνω σειρά με τις 2 στήλες δίπλα-δίπλα */
        .top-row {
            display: flex;
            width: 100%;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        /* Μεγάλα πλήκτρα αφής (Touch Targets) ιδανικά για κινητά */
        .top-row button {
            flex: 1;
            padding: 20px 0; /* Πολύ μεγάλο ύψος για εύκολο πάτημα με τον αντίχειρα */
            border: none;
            border-radius: 12px;
            font-size: 22px; /* Μεγάλη γραμματοσειρά */
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.05s, background-color 0.2s;
        }

        /* Εφέ πατήματος στην αφή */
        .top-row button:active, .btn-navigate:active {
            transform: scale(0.96);
        }

        .btn-voice {
            background-color: #007bff;
            color: white;
        }

        .btn-keyboard {
            background-color: #e9ecef;
            color: #212529;
            border: 1px solid #ced4da;
        }

        /* Περιοχή εισαγωγής διεύθυνσης */
        .input-container {
            display: none;
            margin-bottom: 16px;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 2.5px solid #007bff;
            border-radius: 12px;
            font-size: 18px;
            background-color: white;
            color: #212529;
        }

        /* Μεγάλο πράσινο κουμπί για πλοήγηση */
        .btn-navigate {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Κείμενο κατάστασης */
        .status-text {
            text-align: center;
            font-size: 16px;
            color: #495057;
            margin-top: 20px;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- 2 Στήλες Δίπλα-Δίπλα στην κορυφή του κινητού -->
<div class="top-row">
    <button class="btn-voice" id="voiceBtn">🎤 Φωνή</button>
    <button class="btn-keyboard" id="keyboardBtn">⌨️ Πλήκτρα</button>
</div>

<!-- Πεδίο Κειμένου (Ανοίγει με τα Πλήκτρα ή μετά τη Φωνή) -->
<div class="input-container" id="inputContainer">
    <input type="text" id="addressInput" placeholder="Εισάγετε διεύθυνση...">
</div>

<!-- Κουμπί Πλοήγησης -->
<button class="btn-navigate" id="navigateBtn">🚀 Έναρξη Πλοήγησης</button>

<!-- Μήνυμα Κατάστασης -->
<div class="status-text" id="statusText"></div>

<script>
    const voiceBtn = document.getElementById('voiceBtn');
    const keyboardBtn = document.getElementById('keyboardBtn');
    const inputContainer = document.getElementById('inputContainer');
    const addressInput = document.getElementById('addressInput');
    const navigateBtn = document.getElementById('navigateBtn');
    const statusText = document.getElementById('statusText');

    // Έλεγχος και ρύθμιση Web Speech API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'el-GR';
        recognition.interimResults = false;

        recognition.onstart = () => {
            statusText.textContent = "🔊 Μιλήστε τώρα, σας ακούω...";
            statusText.style.backgroundColor = "#ffeeba";
            voiceBtn.style.backgroundColor = "#dc3545";
            voiceBtn.textContent = "🛑 Ακούω...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript; // Διορθώθηκε η λήψη κειμένου
            addressInput.value = transcript;
            statusText.textContent = `🎯 Ακούστηκε: "${transcript}"`;
            statusText.style.backgroundColor = "#d4edda";
            
            inputContainer.style.display = "block";
            navigateBtn.style.display = "block";
        };

        recognition.onerror = () => {
            statusText.textContent = "❌ Δεν ακούστηκε καλά. Ξαναπροσπαθήστε.";
            statusText.style.backgroundColor = "#f8d7da";
            resetVoiceButton();
        };

        recognition.onend = () => {
            resetVoiceButton();
        };
    } else {
        voiceBtn.style.display = 'none';
        statusText.textContent = "⚠️ Ανοίξτε τη σελίδα από τον Google Chrome στο Android.";
    }

    function resetVoiceButton() {
        voiceBtn.style.backgroundColor = "#007bff";
        voiceBtn.textContent = "🎤 Φωνή";
    }

    // Όταν πατάει "Φωνή"
    voiceBtn.addEventListener('click', () => {
        if (SpeechRecognition) {
            recognition.start();
        }
    });

    // Όταν πατάει "Πλήκτρα"
    keyboardBtn.addEventListener('click', () => {
        inputContainer.style.display = "block";
        navigateBtn.style.display = "block";
        addressInput.focus(); // Εμφανίζει αυτόματα το πληκτρολόγιο του κινητού
        statusText.textContent = "Γράψτε τη διεύθυνση.";
        statusText.style.backgroundColor = "#e2e3e5";
    });

    // Όταν πατάει "Έναρξη Πλοήγησης" -> Άνοιγμα Google Maps
    navigateBtn.addEventListener('click', () => {
        const address = addressInput.value.trim();
        if (address !== "") {
            window.location.href = `google.navigation:q=${encodeURIComponent(address)}`;
        } else {
            alert("Παρακαλώ γράψτε ή πείτε μια διεύθυνση.");
        }
    });
</script>

</body>
</html>
