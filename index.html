<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Google Maps Navigation</title>
    <style>
        body { 
            background: #1a202c; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            gap: 15px; 
        }
        .search-box {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 2px solid #4a5568;
            background: #2d3748;
            color: white;
            outline: none;
            text-align: center;
        }
        .search-box:focus {
            border-color: #1a73e8;
        }
        .nav-btn { 
            background: #1a73e8;
            color: white; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            cursor: pointer; 
            text-decoration: none; 
            text-align: center; 
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Πλαίσιο εισαγωγής διεύθυνσης -->
    <input type="text" id="addressInput" class="search-box" placeholder="Γράψε διεύθυνση..." autocomplete="off">

    <!-- Κουμπί για αποκλειστικό άνοιγμα στο Android Maps App -->
    <button class="nav-btn" onclick="openAndroidMaps()">🚀 Έναρξη Πλοήγησης</button>

    <script>
        function openAndroidMaps() {
            const address = document.getElementById('addressInput').value.trim();
            
            if (address === "") {
                alert("Παρακαλώ πληκτρολόγησε μια διεύθυνση πρώτα!");
                return;
            }
            
            // Κωδικοποίηση της διεύθυνσης για ασφαλή μεταφορά
            const encodedAddress = encodeURIComponent(address);
            
            // Το ειδικό URI Scheme που αναγκάζει ΜΟΝΟ το Android Google Maps App να ανοίξει
            window.location.href = `google.navigation:q=${encodedAddress}`;
        }
    </script>

</body>
</html>
