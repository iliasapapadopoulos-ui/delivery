<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Πλοήγηση</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #000000; /* Μαύρο φόντο */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Μετακίνηση των πλήκτρων προς τα κάτω κατά περίπου 5 εκατοστά (190px) */
        .top-row {
            display: flex;
            width: 100%;
            gap: 12px;
            margin-top: 190px; 
            margin-bottom: 20px;
        }
        
        .top-row button {
            flex: 1;
            padding: 20px 0;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255,255,255,0.05);
            transition: transform 0.05s, background-color 0.2s;
        }

        .top-row button:active, .btn-navigate:active {
            transform: scale(0.96);
        }

        .btn-voice {
            background-color: #007bff;
            color: white;
        }

        .btn-keyboard {
            background-color: #333333; /* Σκούρο γκρι για τα πλήκτρα */
            color: white;
            border: 1px solid #444444;
        }

        .input-container {
            display: none;
            margin-bottom: 16px;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 2.5px solid #007bff;
            border-radius: 12px;
            font-size: 18px;
            background-color: #111111; /* Σκούρο πλαίσιο κειμένου */
            color: white;
        }

        .btn-navigate {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<!-- Τα δύο πλήκτρα χαμηλωμένα στην οθόνη -->
<div class="top-row">
    <button class="btn-voice" id="voiceBtn">🎤 Φωνή</button>
    <button class="btn-keyboard" id="keyboardBtn">⌨️ Πλήκτρα</button>
</div>

<!-- Πεδίο Κειμένου -->
<div class="input-container" id="inputContainer">
    <input type="text" id="addressInput" placeholder="Εισάγετε διεύθυνση...">
</div>

<!-- Κουμπί Πλοήγησης -->
<button class="btn-navigate" id="navigateBtn">🚀 Έναρξη Πλοήγησης</button>

<script>
    const voiceBtn = document.getElementById('voiceBtn');
    const keyboardBtn = document.getElementById('keyboardBtn');
    const inputContainer = document.getElementById('inputContainer');
    const addressInput = document.getElementById('addressInput');
    const navigateBtn = document.getElementById('navigateBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'el-GR';
        recognition.interimResults = false;

        recognition.onstart = () => {
            voiceBtn.style.backgroundColor = "#dc3545";
            voiceBtn.textContent = "🛑 Ακούω...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            addressInput.value = transcript;
            
            inputContainer.style.display = "block";
            navigateBtn.style.display = "block";
        };

        recognition.onerror = () => {
            resetVoiceButton();
        };

        recognition.onend = () => {
            resetVoiceButton();
        };
    } else {
        voiceBtn.style.display = 'none';
    }

    function resetVoiceButton() {
        voiceBtn.style.backgroundColor = "#007bff";
        voiceBtn.textContent = "🎤 Φωνή";
    }

    voiceBtn.addEventListener('click', () => {
        if (SpeechRecognition) {
            recognition.start();
        }
    });

    keyboardBtn.addEventListener('click', () => {
        inputContainer.style.display = "block";
        navigateBtn.style.display = "block";
        addressInput.focus();
    });

    navigateBtn.addEventListener('click', () => {
        const address = addressInput.value.trim();
        if (address !== "") {
            window.location.href = `google.navigation:q=${encodeURIComponent(address)}`;
        }
    });
</script>

</body>
</html>
