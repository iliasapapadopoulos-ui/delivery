<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Φωνητική Πλοήγηση</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 400px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-speak {
            background-color: #2196F3;
            color: white;
        }
        .btn-navigate {
            background-color: #4CAF50;
            color: white;
            margin-top: 20px;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Πλοήγηση Google Maps</h2>
    
    <!-- Πεδίο εισαγωγής διεύθυνσης -->
    <input type="text" id="addressInput" placeholder="Πληκτρολογήστε διεύθυνση...">
    
    <!-- Κουμπί για το Μικρόφωνο -->
    <button class="btn-speak" id="speakBtn">🎤 Εκφώνηση Διεύθυνσης</button>
    
    <!-- Κουμπί για Έναρξη Πλοήγησης -->
    <button class="btn-navigate" id="navigateBtn">Έναρξη Πλοήγησης</button>
</div>

<script>
    const addressInput = document.getElementById('addressInput');
    const speakBtn = document.getElementById('speakBtn');
    const navigateBtn = document.getElementById('navigateBtn');

    // 1. Λειτουργία Φωνητικής Αναγνώρισης (Web Speech API)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'el-GR'; // Ορισμός Ελληνικής γλώσσας
        recognition.interimResults = false;

        speakBtn.addEventListener('click', () => {
            recognition.start();
            speakBtn.textContent = "🎤 Σας ακούω...";
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            addressInput.value = transcript;
            speakBtn.textContent = "🎤 Εκφώνηση Διεύθυνσης";
        };

        recognition.onerror = () => {
            alert("Παρουσιάστηκε σφάλμα στη φωνητική αναγνώριση.");
            speakBtn.textContent = "🎤 Εκφώνηση Διεύθυνσης";
        };

        recognition.onend = () => {
            speakBtn.textContent = "🎤 Εκφώνηση Διεύθυνσης";
        };
    } else {
        speakBtn.style.display = 'none';
        alert("Η φωνητική αναγνώριση δεν υποστηρίζεται σε αυτόν τον browser. Χρησιμοποιήστε Google Chrome στο Android.");
    }

    // 2. Άνοιγμα Google Maps για Android (Deep Linking / Intent)
    navigateBtn.addEventListener('click', () => {
        const address = addressInput.value.trim();
        if (address !== "") {
            // Το ειδικό URL (Intent) που αναγκάζει το Android να ανοίξει την εφαρμογή Google Maps σε λειτουργία πλοήγησης
            const mapsUrl = `google.navigation:q=${encodeURIComponent(address)}`;
            
            // Δοκιμή ανοίγματος της εφαρμογής
            window.location.href = mapsUrl;
        } else {
            alert("Παρακαλώ εισάγετε ή εκφωνήστε μια διεύθυνση.");
        }
    });
</script>

</body>
</html>
